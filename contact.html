<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Ajmal Fawaz</title>
    <meta name="description" content="Get in touch with Ajmal Fawaz for UI/UX design and front-end development projects.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="contact-page">

    <!-- Navigation -->
    <nav class="contact-nav">
        <a href="index.html" class="contact-nav-logo">A.</a>
        <a href="index.html" class="contact-nav-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M19 12H5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M11 18L5 12L11 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Back</span>
        </a>
    </nav>

    <!-- Main Contact Section -->
    <main class="contact-main">
        <div class="contact-grid">

            <!-- Left Column — Heading -->
            <div class="contact-heading-col">
                <h1 class="contact-heading">
                    If you're looking for a <br>
                    designer <span>&</span> developer, <br>
                    please fill out the form.
                </h1>

                <div class="contact-heading-circle">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M7 17L17 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M7 7H17V17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>

            <!-- Right Column — Form -->
            <div class="contact-form-col">
                <div class="contact-form-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>INFO</span>
                </div>

                <form class="contact-form" id="contact-form" action="mailto:ajmalfawaz37@gmail.com" method="POST" enctype="text/plain">

                    <!-- Row 1: Name + Phone -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cf-name">NAME</label>
                            <input type="text" id="cf-name" name="name" placeholder="First Last" required autocomplete="name">
                        </div>
                        <div class="form-group">
                            <label for="cf-phone">PHONE</label>
                            <input type="tel" id="cf-phone" name="phone" placeholder="Your Phone" autocomplete="tel">
                        </div>
                    </div>

                    <!-- Row 2: Company + Email -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cf-company">COMPANY</label>
                            <input type="text" id="cf-company" name="company" placeholder="Company Name">
                        </div>
                        <div class="form-group">
                            <label for="cf-email">EMAIL</label>
                            <input type="email" id="cf-email" name="email" placeholder="Email Address" required autocomplete="email">
                        </div>
                    </div>

                    <!-- Row 3: Message -->
                    <div class="form-row form-row-full">
                        <div class="form-group form-group-full">
                            <label for="cf-message">MESSAGE</label>
                            <textarea id="cf-message" name="message" placeholder="Your Message" rows="3" required></textarea>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="form-actions">
                        <button type="submit" class="form-submit" id="form-submit">
                            <span>Submit</span>
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </main>

</body>

</html>
